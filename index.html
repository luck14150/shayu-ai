<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>傻宇1号 - AI智能助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html {
    height: 100%;
    width: 100%;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
}
.container {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    background: #f8f9ff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
/* 桌面端适配 */
@media (min-width: 500px) and (min-height: 600px) {
    body {
        padding: 15px;
    }
    .container {
        max-width: 420px;
        max-height: calc(100% - 30px);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
}
@media (min-width: 768px) {
    body {
        padding: 20px;
    }
    .container {
        max-width: 480px;
        max-height: calc(100% - 40px);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
}
/* 头部 */
.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 12px 14px;
    color: white;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}
.avatar {
    width: 38px;
    height: 38px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-info h1 { font-size: 16px; margin-bottom: 2px; }
.header-info .status { font-size: 11px; opacity: 0.9; display: flex; align-items: center; gap: 4px; }
.status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
.quick-actions { display: flex; gap: 6px; flex-shrink: 0; }
.quick-btn {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
/* 聊天区域 */
.chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #f8f9ff;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
}
.message { margin-bottom: 12px; display: flex; animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.message.user { justify-content: flex-end; }
.bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
}
.message.user .bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 4px;
}
.message.ai .bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
}
.message.system .bubble {
    background: #fff8e1;
    color: #666;
    border-radius: 10px;
    font-size: 12px;
    text-align: center;
    max-width: 90%;
}
.message.typing .bubble {
    background: white;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
}
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
    width: 6px; height: 6px;
    background: #667eea;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
/* 快捷问题 */
.quick-questions {
    padding: 8px 10px;
    background: white;
    border-top: 1px solid #e8eaf6;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    white-space: nowrap;
    flex-shrink: 0;
}
.quick-questions::-webkit-scrollbar { display: none; }
.quick-q {
    padding: 6px 12px;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8eaf6 100%);
    border: none;
    border-radius: 16px;
    font-size: 12px;
    color: #667eea;
    cursor: pointer;
    flex-shrink: 0;
}
/* 输入区域 */
.input-area {
    padding: 8px 10px;
    background: white;
    border-top: 1px solid #e8eaf6;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
}
.input-wrapper { flex: 1; position: relative; }
.input-area input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    border: 1.5px solid #e8eaf6;
    border-radius: 20px;
    font-size: 14px;
}
.input-area input:focus { outline: none; border-color: #667eea; }
.voice-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 14px;
    cursor: pointer;
}
.voice-btn.recording { background: #ef4444; }
.send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.send-btn:disabled { opacity: 0.5; }
/* 底部 */
.footer-tip {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: #999;
    background: #f8f9ff;
    flex-shrink: 0;
}
/* Token用量显示 */
.token-bar {
    padding: 4px 12px;
    background: linear-gradient(90deg, #f0f4ff 0%, #e8eaf6 100%);
    border-top: 1px solid #dde2f1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #667eea;
    flex-shrink: 0;
}
.token-bar .token-info {
    display: flex;
    gap: 12px;
}
.token-bar .token-item {
    display: flex;
    align-items: center;
    gap: 4px;
}
.token-bar .token-warn {
    color: #ef4444;
    font-weight: bold;
}
/* 设置面板 */
.config-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.config-panel.show { display: flex; }
.config-content {
    width: 90%;
    max-width: 350px;
    background: white;
    border-radius: 16px;
    padding: 20px;
    max-height: 80vh;
    overflow-y: auto;
}
.config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.config-header h2 { font-size: 16px; color: #333; }
.config-close {
    width: 28px; height: 28px;
    background: #f0f4ff;
    border: none;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
}
.config-item { margin-bottom: 12px; }
.config-item label { display: block; margin-bottom: 6px; font-size: 13px; color: #666; }
.config-item input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e8eaf6;
    border-radius: 8px;
    font-size: 13px;
}
.config-item input:focus { outline: none; border-color: #667eea; }
.config-save {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
}
/* 天气卡片 */
.weather-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 8px 0;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
}
.weather-card .temp { font-size: 28px; font-weight: 300; }
.weather-card .info { flex: 1; }
.weather-card .city { font-size: 12px; opacity: 0.9; }
.weather-card .desc { font-size: 14px; margin-top: 2px; }
.weather-card .icon { font-size: 32px; }
.weather-card .detail { display: flex; gap: 10px; margin-top: 4px; font-size: 11px; opacity: 0.85; }
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header">
        <div class="avatar">🤖</div>
        <div class="header-info">
            <h1>傻宇1号</h1>
            <div class="status">
                <div class="status-dot"></div>
                <span>在线</span>
            </div>
        </div>
        <div class="quick-actions">
            <button class="quick-btn" onclick="toggleConfig()" title="设置">⚙️</button>
            <button class="quick-btn" onclick="clearChat()" title="清空">🗑️</button>
            <button class="quick-btn" onclick="toggleSpeech()" title="语音">🔊</button>
        </div>
    </div>
    
    <div class="chat-area" id="chatArea">
        <div class="message ai">
            <div class="bubble">主人您好！我是傻宇1号～😊<br><br>我可以帮您：<br>📝 回答问题<br>💻 编写代码<br>🎵 语音对话<br>💡 提供建议<br><br>请输入您想说的话，或点击下方快捷按钮！</div>
        </div>
    </div>
    
    <div class="quick-questions" id="quickQuestions">
        <button class="quick-q" onclick="handleWeatherQuery()">🌤️ 天气</button>
        <button class="quick-q" onclick="askQuestion('给我讲个有趣的故事')">📖 故事</button>
        <button class="quick-q" onclick="askQuestion('安慰安慰我')">💝 安慰</button>
        <button class="quick-q" onclick="askQuestion('推荐一首好听的歌')">🎵 音乐</button>
        <button class="quick-q" onclick="askQuestion('帮我写代码')">💻 代码</button>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    
    <div class="token-bar" id="tokenBar">
        <div class="token-info">
            <div class="token-item">📝 输入: <span id="promptTokens">0</span></div>
            <div class="token-item">💬 回复: <span id="completionTokens">0</span></div>
            <div class="token-item">📊 累计: <span id="totalTokens">0</span></div>
            <div class="token-item">🔄 上下文: <span id="contextCount">0</span>条</div>
        </div>
        <div class="token-info" id="tokenWarn" style="display:none;">
            <span class="token-warn">⚠️ 上下文较长</span>
        </div>
    </div>
    
    <div class="footer-tip">傻宇1号 v4.1 · 节省token优化</div>
</div>

<div class="config-panel" id="configPanel">
    <div class="config-content">
        <div class="config-header">
            <h2>⚙️ 设置</h2>
            <button class="config-close" onclick="toggleConfig()">✕</button>
        </div>
        <div class="config-item">
            <label>API地址</label>
            <input type="text" id="apiBase" placeholder="https://api.deepseek.com">
        </div>
        <div class="config-item">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="sk-...">
        </div>
        <div class="config-item">
            <label>模型</label>
            <input type="text" id="model" placeholder="deepseek-chat">
        </div>
        <div class="config-item">
            <label>天气城市</label>
            <input type="text" id="weatherCity" placeholder="如：北京">
        </div>
        <div class="config-item">
            <label>🔄 上下文消息数 (默认10,节省token)</label>
            <input type="number" id="contextLimit" placeholder="10" min="2" max="50">
        </div>
        <div class="config-item">
            <label>💬 单次回复token上限 (默认500,越短越省)</label>
            <input type="number" id="maxTokens" placeholder="500" min="100" max="2000">
        </div>
        <button class="config-save" onclick="saveConfig()">保存</button>
    </div>
</div>

<script>
let messages = [];
let isRecording = false;
let recognition = null;
let speechSynthesis = window.speechSynthesis || null;
let currentUtterance = null;
let autoSpeak = true;
let totalTokensUsed = 0;       // 累计token
let sessionPromptTokens = 0;    // 累计输入token
let sessionCompletionTokens = 0; // 累计输出token

const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const apiBaseEl = document.getElementById('apiBase');
const apiKeyEl = document.getElementById('apiKey');
const modelEl = document.getElementById('model');
const weatherCityEl = document.getElementById('weatherCity');
const contextLimitEl = document.getElementById('contextLimit');
const maxTokensEl = document.getElementById('maxTokens');

const DEFAULT_API_KEY = 'sk-5c8cbf625e744e649f99fa2277705af9';

// 初始化
apiBaseEl.value = localStorage.getItem('shayu_apiBase') || 'https://api.deepseek.com';
apiKeyEl.value = localStorage.getItem('shayu_apiKey') || DEFAULT_API_KEY;
modelEl.value = localStorage.getItem('shayu_model') || 'deepseek-chat';
weatherCityEl.value = localStorage.getItem('shayu_weatherCity') || '';
contextLimitEl.value = parseInt(localStorage.getItem('shayu_contextLimit') || '10');
maxTokensEl.value = parseInt(localStorage.getItem('shayu_maxTokens') || '500');
autoSpeak = localStorage.getItem('shayu_autoSpeak') !== 'false';
totalTokensUsed = parseInt(localStorage.getItem('shayu_totalTokens') || '0');
updateTokenDisplay();

function updateTokenDisplay() {
    document.getElementById('totalTokens').textContent = totalTokensUsed;
    document.getElementById('contextCount').textContent = messages.length;
    const contextLimit = parseInt(localStorage.getItem('shayu_contextLimit') || '10');
    const warnEl = document.getElementById('tokenWarn');
    if (messages.length > contextLimit) {
        warnEl.style.display = 'flex';
    } else {
        warnEl.style.display = 'none';
    }
}

function saveConfig() {
    localStorage.setItem('shayu_apiBase', apiBaseEl.value);
    localStorage.setItem('shayu_apiKey', apiKeyEl.value);
    localStorage.setItem('shayu_model', modelEl.value);
    localStorage.setItem('shayu_weatherCity', weatherCityEl.value);
    localStorage.setItem('shayu_contextLimit', contextLimitEl.value || '10');
    localStorage.setItem('shayu_maxTokens', maxTokensEl.value || '500');
    toggleConfig();
    addMessage('配置已保存～上下文:' + (contextLimitEl.value || '10') + '条, 回复上限:' + (maxTokensEl.value || '500') + 'token', 'system');
    updateTokenDisplay();
}

function toggleConfig() {
    document.getElementById('configPanel').classList.toggle('show');
}

function toggleSpeech() {
    autoSpeak = !autoSpeak;
    localStorage.setItem('shayu_autoSpeak', autoSpeak);
    addMessage(autoSpeak ? '语音播放已开启' : '语音播放已关闭', 'system');
}

function clearChat() {
    messages = [];
    chatArea.innerHTML = '<div class="message ai"><div class="bubble">已清空对话～有什么需要帮忙的吗？😊<br><br>💡 小提示: 清空对话会节省大量token, 推荐对话超过10轮后清理一次</div></div>';
    if (speechSynthesis) speechSynthesis.cancel();
    document.getElementById('promptTokens').textContent = '0';
    document.getElementById('completionTokens').textContent = '0';
    updateTokenDisplay();
}

function askQuestion(q) {
    userInput.value = q;
    sendMessage();
}

// 天气
async function handleWeatherQuery() {
    const city = weatherCityEl.value || '北京';
    addMessage(`正在查询${city}天气...`, 'system');
    
    const apiBase = apiBaseEl.value || 'https://api.deepseek.com';
    const apiKey = apiKeyEl.value || DEFAULT_API_KEY;
    const model = modelEl.value || 'deepseek-chat';
    const responseTokenLimit = parseInt(localStorage.getItem('shayu_maxTokens') || '500');
    
    try {
        const response = await fetch(apiBase.replace(/\/$/, '') + '/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    {role: 'system', content: '你是天气助手,根据城市提供天气信息,回复简洁友好,控制在150字以内。'},
                    {role: 'user', content: `${city}今天天气怎么样?温度湿度和穿衣建议`}
                ],
                temperature: 0.7,
                max_tokens: Math.min(responseTokenLimit, 400)
            })
        });
        const data = await response.json();
        if (data.choices && data.choices[0]) {
            addMessage(data.choices[0].message.content, 'ai', autoSpeak);
        }
    } catch (e) {
        addMessage('查询失败: ' + e.message, 'system');
    }
}

// 消息
function addMessage(text, role, speak = false) {
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    
    if (speak && role === 'ai') {
        speakText(text);
    }
}

function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai typing';
    msg.id = 'typing-msg';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
}

// 语音
function speakText(text) {
    if (!speechSynthesis) return;
    if (speechSynthesis.speaking) speechSynthesis.cancel();
    
    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.lang = 'zh-CN';
    currentUtterance.rate = 1;
    speechSynthesis.speak(currentUtterance);
}

function toggleVoice() {
    if (isRecording) {
        if (recognition) recognition.stop();
    } else {
        startRecording();
    }
}

function startRecording() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        addMessage('浏览器不支持语音识别', 'system');
        return;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = true;
    
    recognition.onstart = () => {
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹';
    };
    
    recognition.onresult = (event) => {
        const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
        userInput.value = transcript;
    };
    
    recognition.onend = () => {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        if (userInput.value.trim()) sendMessage();
    };
    
    recognition.onerror = (event) => {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        if (event.error !== 'no-speech') {
            addMessage('语音识别出错', 'system');
        }
    };
    
    recognition.start();
}

// 发送消息
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    
    addMessage(text, 'user');
    messages.push({role: 'user', content: text});
    userInput.value = '';
    sendBtn.disabled = true;
    addTyping();

    const apiBase = apiBaseEl.value || 'https://api.deepseek.com';
    const apiKey = apiKeyEl.value || DEFAULT_API_KEY;
    const model = modelEl.value || 'deepseek-chat';
    
    // ⭐ 核心优化: 只发送最近N条消息, 大幅节省token
    const contextLimit = parseInt(localStorage.getItem('shayu_contextLimit') || '10');
    const responseTokenLimit = parseInt(localStorage.getItem('shayu_maxTokens') || '500');
    
    // 取最后N条消息(确保始终有最新内容)
    const trimmedMessages = messages.length > contextLimit 
        ? messages.slice(-contextLimit) 
        : messages;

    try {
        const response = await fetch(apiBase.replace(/\/$/, '') + '/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    {role: 'system', content: '你是傻宇1号,温暖有趣的AI助手。说话亲切简洁,适当用emoji。回复控制在200字以内。'},
                    ...trimmedMessages
                ],
                temperature: 0.8,
                max_tokens: responseTokenLimit
            })
        });

        const data = await response.json();
        removeTyping();

        if (data.choices && data.choices[0]) {
            const reply = data.choices[0].message.content;
            addMessage(reply, 'ai', autoSpeak);
            messages.push({role: 'assistant', content: reply});
            
            // ⭐ 统计并显示token用量(DeepSeek API返回usage)
            if (data.usage) {
                const promptTokens = data.usage.prompt_tokens || 0;
                const completionTokens = data.usage.completion_tokens || 0;
                const totalTokens = data.usage.total_tokens || 0;
                
                document.getElementById('promptTokens').textContent = promptTokens;
                document.getElementById('completionTokens').textContent = completionTokens;
                totalTokensUsed += totalTokens;
                localStorage.setItem('shayu_totalTokens', totalTokensUsed.toString());
                
                // 估算成本(DeepSeek: 0.00014元/1K input, 0.00028元/1K output)
                const cost = (promptTokens * 0.00014 + completionTokens * 0.00028) / 1000;
                const totalCost = totalTokensUsed * 0.0000002;
                
                addMessage(`本次消耗: ${promptTokens}输入+${completionTokens}输出=${totalTokens}token (约¥${cost.toFixed(4)}), 累计:${totalTokensUsed}token`, 'system');
            }
        } else if (data.error) {
            addMessage('错误: ' + (data.error.message || JSON.stringify(data.error)), 'system');
        }
    } catch (e) {
        removeTyping();
        addMessage('出错了: ' + e.message, 'system');
    }

    sendBtn.disabled = false;
    updateTokenDisplay();
    userInput.focus();
}

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
